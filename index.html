<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órdenes de Pedido - ACTIVA</title>

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- SheetJS para exportar a Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-100%); } to { opacity: 1; transform: translateX(0); } }
    
    .anim-fade { animation: fadeIn 200ms ease-out; }
    .anim-slide-up { animation: slideUp 220ms ease-out; }
    .anim-slide-in-right { animation: slideInRight 200ms ease-out; }
    .anim-slide-in-left { animation: slideInLeft 220ms ease-out; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef, useCallback } = React;

    // --- CONFIGURACIÓN DE BASE DE DATOS Y USUARIOS ---
    const GOOGLE_SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzphjFRhD1cfyY7IPbEJzu-EcT8km_zP36dyWvsLrZvz7KKXTgH0_LyS5tRXMt4Y6c/exec"; 
    
    // IMPORTANTE: Pega aquí la URL HTTP POST que te genera Power Automate
    const POWER_AUTOMATE_WEBHOOK_URL = "PEGAR_AQUI_LA_URL_DE_POWER_AUTOMATE"; 

    // Lista de columnas obligatorias
    const COLUMNAS_OBLIGATORIAS = [
      "importancia estratégica",
      "fecha inicio evento",
      "fecha fin evento",
      "fecha orden pedido",
      "número orden de pedido",
      "tipo",
      "evento",
      "lugar del evento",
      "estado",
      "contrato"
    ];

    const parseNum = (val) => parseFloat((val || "").toString().replace(/\./g, '')) || 0;

    // --- COMPONENTES UI Y GRÁFICAS ---

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const t = setTimeout(onClose, type === 'error' ? 5000 : 3500); 
        return () => clearTimeout(t);
      }, [onClose, type]);

      const styles = type === "error" ? "bg-red-50 border-red-200 text-red-800" : "bg-green-50 border-green-200 text-green-800";
      const iconName = type === "error" ? "alert-circle" : "check-circle";

      return (
        <div className={`fixed bottom-6 right-6 z-[60] max-w-sm border rounded-xl shadow-lg p-4 flex items-start gap-3 anim-slide-in-right ${styles}`}>
          <i data-lucide={iconName} className="w-5 h-5 flex-shrink-0 mt-0.5"></i>
          <div className="flex-1 text-sm font-medium">{message}</div>
          <button onClick={onClose} className="opacity-60 hover:opacity-100 transition-opacity"><i data-lucide="x" className="w-4 h-4"></i></button>
        </div>
      );
    };

    const CustomBarChart = ({ data, formatCurrency }) => {
      const max = Math.max(...data.map(d => d.value), 1);
      if (data.length === 0) return <div className="h-48 flex items-center justify-center text-gray-400 text-sm">Sin datos para mostrar</div>;

      return (
        <div className="h-48 w-full mt-2 flex items-end justify-around gap-2">
          {data.map((item, index) => (
            <div key={index} className="flex-1 h-full flex flex-col items-center group min-w-0">
              <div className="flex-1 w-full flex items-end justify-center">
                <div
                  className="w-full max-w-[40px] bg-[#1a8241] rounded-t transition-all duration-1000 ease-out relative hover:bg-green-600 cursor-pointer"
                  style={{ height: `${(item.value / max) * 100}%`, minHeight: item.value > 0 ? '4px' : '0' }}
                >
                  <div className="absolute -top-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10 whitespace-nowrap">
                    {formatCurrency ? new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(item.value) : item.value}
                  </div>
                </div>
              </div>
              <span className="text-[10px] text-gray-500 mt-2 text-center w-full px-0.5 leading-tight whitespace-normal break-words" title={item.label}>
                {item.label}
              </span>
            </div>
          ))}
        </div>
      );
    };

    const HorizontalBarChart = ({ data }) => {
      const max = Math.max(...data.map(d => d.value), 1);
      if (data.length === 0) return <div className="p-4 text-center text-gray-400 text-sm">No hay proveedores con informes aprobados.</div>;
      
      return (
        <div className="w-full flex flex-col gap-4 mt-2 max-h-48 overflow-y-auto pr-2">
          {data.map((item, idx) => (
            <div key={idx} className="flex flex-col gap-1.5">
              <div className="flex justify-between text-[11px] font-bold text-gray-600 uppercase tracking-wide">
                <span className="truncate pr-2" title={item.label}>{item.label}</span>
                <span className="text-[#1a8241]">{item.value} {item.value === 1 ? 'orden' : 'órdenes'}</span>
              </div>
              <div className="w-full bg-gray-100 rounded-full h-2">
                <div className="bg-[#1a8241] h-2 rounded-full transition-all duration-1000" style={{ width: `${(item.value/max)*100}%` }}></div>
              </div>
            </div>
          ))}
        </div>
      );
    };

    const SearchableSelect = ({ name, options, defaultValue, required, className, onSelect }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [search, setSearch] = useState(defaultValue || "");
      const wrapperRef = useRef(null);

      useEffect(() => {
        setSearch(defaultValue || "");
      }, [defaultValue]);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
            setIsOpen(false);
            if (search && !options.includes(search)) {
              setSearch("");
              if (onSelect) onSelect("");
            }
          }
        };
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, [search, options, onSelect]);

      const filtered = options.filter(o => o.toLowerCase().includes(search.toLowerCase()));

      return (
        <div className="relative" ref={wrapperRef}>
          <input
            type="text"
            name={name}
            required={required}
            value={search}
            onChange={e => {
              setSearch(e.target.value);
              setIsOpen(true);
            }}
            onFocus={() => setIsOpen(true)}
            className={className}
            autoComplete="off"
            placeholder="Escribe para buscar..."
          />
          {isOpen && filtered.length > 0 && (
            <ul className="absolute z-50 w-full bg-white border border-gray-300 shadow-2xl max-h-56 overflow-y-auto rounded-md mt-1 divide-y divide-gray-100">
              {filtered.map((opt, i) => (
                <li
                  key={i}
                  className="px-4 py-2 cursor-pointer hover:bg-green-50 hover:text-[#1a8241] text-sm text-gray-700 transition-colors"
                  onMouseDown={(e) => {
                    e.preventDefault(); 
                    setSearch(opt);
                    setIsOpen(false);
                    if (onSelect) onSelect(opt);
                  }}
                >
                  {opt}
                </li>
              ))}
            </ul>
          )}
          {isOpen && search && filtered.length === 0 && (
            <div className="absolute z-50 w-full bg-white border border-red-200 shadow-xl p-3 text-sm text-red-500 rounded-md mt-1 text-center font-medium">
              Opción no encontrada en la lista.
            </div>
          )}
        </div>
      );
    };

    // --- PANTALLA 1: LOGIN ---
    const LoginScreen = ({ onLogin, error, loading, usuariosDisponibles }) => {
      const [ejecutivo, setEjecutivo] = useState("");
      const [password, setPassword] = useState("");

      let ejecutivosLista = usuariosDisponibles?.length > 0 
        ? usuariosDisponibles.map(u => u.ejecutivo) 
        : ["Katheryn Zapata"];

      if (!ejecutivosLista.includes("Directivos")) ejecutivosLista.push("Directivos");

      useEffect(() => { if (typeof lucide !== "undefined") lucide.createIcons(); }, [error, loading]);

      const onSubmit = (e) => {
        e.preventDefault();
        onLogin(ejecutivo, password);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-[#f8f9fa] via-white to-[#e0f2e9] flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-xl border border-gray-100 p-6 sm:p-8 w-full max-w-md anim-slide-up">
            <div className="flex flex-col items-center mb-6">
              <div className="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mb-4 text-[#1a8241]">
                <i data-lucide="file-text" className="w-8 h-8"></i>
              </div>
              <h1 className="text-xl sm:text-2xl font-bold text-[#1a8241] text-center">Órdenes de Pedido</h1>
              <p className="text-xs text-gray-500 mt-1 text-center font-medium tracking-widest uppercase">Plataforma ACTIVA</p>
            </div>

            <form onSubmit={onSubmit}>
              <div className="mb-4">
                <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-bold">Ejecutivo / Usuario</label>
                <select required value={ejecutivo} onChange={e => setEjecutivo(e.target.value)} className="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-[14px] text-gray-800 focus:outline-none focus:border-[#1a8241] focus:ring-1 focus:ring-[#1a8241] transition-all">
                  <option value="" disabled>Selecciona tu perfil...</option>
                  {ejecutivosLista.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </div>

              <div className="mb-5">
                <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-bold">Contraseña</label>
                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-[14px] text-gray-800 focus:outline-none focus:border-[#1a8241] focus:ring-1 focus:ring-[#1a8241] transition-all" />
              </div>

              {error && (
                <div className="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg flex items-start gap-2">
                  <i data-lucide="alert-circle" className="w-4 h-4 mt-0.5 flex-shrink-0"></i>
                  <span>{error}</span>
                </div>
              )}

              <button type="submit" disabled={loading || !ejecutivo || !password} className="w-full bg-[#1a8241] hover:bg-green-800 text-white py-3 rounded-lg font-medium transition-colors flex items-center justify-center gap-2 shadow-md disabled:opacity-70 disabled:cursor-not-allowed">
                {loading ? <><i data-lucide="refresh-cw" className="w-4 h-4 animate-spin"></i> Verificando...</> : <><i data-lucide="log-in" className="w-4 h-4"></i> Iniciar Sesión</>}
              </button>
            </form>
          </div>
        </div>
      );
    };

    // --- PANTALLA 2: SELECCIÓN DE CONTRATOS E INDICADORES ---
    const ContractSelection = ({ onSelectContract, onLogout, user, dbData }) => {
      const [search, setSearch] = useState("");
      const [activeTab, setActiveTab] = useState("contratos");
      
      useEffect(() => { if (typeof lucide !== "undefined") lucide.createIcons(); });

      const isDirectivo = user.role === 'Directivos';
      const contratos = dbData.contratos || [];
      
      const misContratos = isDirectivo 
        ? contratos 
        : contratos.filter(c => c.ejecutivo && c.ejecutivo.trim().toLowerCase() === user.name.trim().toLowerCase());

      const filtered = misContratos.filter(c => c.entidad.toLowerCase().includes(search.toLowerCase()));

      const misContratosNombres = misContratos.map(c => c.entidad.toLowerCase().trim());
      const contratoKey = dbData.headers.find(h => h.trim().toLowerCase() === 'contrato');
      
      const misOrdenes = useMemo(() => (dbData.ordenes || []).filter(o => {
        const cName = contratoKey ? (o[contratoKey] || "").toString().toLowerCase().trim() : (o['Contrato'] || "").toString().toLowerCase().trim();
        return misContratosNombres.includes(cName);
      }), [dbData.ordenes, misContratosNombres, contratoKey]);

      const aprobadoData = useMemo(() => misContratos.map(c => {
         const orders = misOrdenes.filter(o => {
            const cName = contratoKey ? (o[contratoKey] || "").toString().toLowerCase().trim() : (o['Contrato'] || "").toString().toLowerCase().trim();
            return cName === c.entidad.toLowerCase().trim();
         });
         const total = orders.reduce((sum, o) => sum + parseNum(o[Object.keys(o).find(k => k.toLowerCase().includes("valor aprobado"))]), 0);
         return { label: c.entidad.length > 20 ? c.entidad.substring(0, 20) + '...' : c.entidad, value: total };
      }).filter(d => d.value > 0), [misContratos, misOrdenes, contratoKey]);

      const facturadoData = useMemo(() => misContratos.map(c => {
         const orders = misOrdenes.filter(o => {
            const cName = contratoKey ? (o[contratoKey] || "").toString().toLowerCase().trim() : (o['Contrato'] || "").toString().toLowerCase().trim();
            return cName === c.entidad.toLowerCase().trim();
         });
         const total = orders.reduce((sum, o) => sum + parseNum(o[Object.keys(o).find(k => k.toLowerCase().includes("valor facturado"))]), 0);
         return { label: c.entidad.length > 20 ? c.entidad.substring(0, 20) + '...' : c.entidad, value: total };
      }).filter(d => d.value > 0), [misContratos, misOrdenes, contratoKey]);

      const provData = useMemo(() => {
        const provConEvidencia = {};
        misOrdenes.forEach(o => {
           const provKey = Object.keys(o).find(k => k.toLowerCase().includes("nombre proveedor"));
           const prov = provKey ? o[provKey] : null;
           
           const evKey = Object.keys(o).find(k => k.toLowerCase().includes("informe de evidencias"));
           const ev = evKey ? o[evKey].toString().toUpperCase().trim() : "";
           
           if(prov && (ev === 'SÍ' || ev === 'SI' || ev === 'SĪ')) {
               provConEvidencia[prov] = (provConEvidencia[prov] || 0) + 1;
           }
        });
        return Object.keys(provConEvidencia).map(k => ({ label: k, value: provConEvidencia[k] })).sort((a,b) => b.value - a.value);
      }, [misOrdenes]);

      return (
        <div className="min-h-screen bg-[#f8f9fa] flex flex-col">
          <header className="bg-[#e0e1dd] pt-4 flex flex-col border-b border-gray-300 shadow-sm z-20">
            <div className="px-6 flex justify-between items-center pb-4">
              <div className="flex items-center gap-3">
                <i data-lucide="folder-open" className="text-[#1a8241] w-7 h-7"></i>
                <div>
                  <h1 className="text-xl font-bold text-[#1a8241] leading-tight">Panel de Control</h1>
                  <p className="text-xs text-gray-600 font-medium">Plataforma ACTIVA</p>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <div className="text-right hidden sm:block">
                  <p className="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Perfil</p>
                  <p className="text-sm font-bold text-[#1a8241]">{user.name}</p>
                </div>
                <button onClick={onLogout} className="p-2 text-gray-600 hover:bg-black/10 hover:text-[#1a8241] rounded-lg transition-colors flex items-center gap-2">
                  <i data-lucide="log-out" className="w-5 h-5"></i>
                  <span className="hidden sm:inline text-sm font-medium">Salir</span>
                </button>
              </div>
            </div>
            
            <div className="px-6 flex gap-6 mt-2">
              <button 
                onClick={() => setActiveTab('contratos')}
                className={`pb-3 text-sm font-bold border-b-[3px] transition-colors ${activeTab === 'contratos' ? 'border-[#1a8241] text-[#1a8241]' : 'border-transparent text-gray-500 hover:text-gray-800'}`}
              >
                {isDirectivo ? 'Todos los Contratos' : 'Mis Contratos'}
              </button>
              <button 
                onClick={() => setActiveTab('indicadores')}
                className={`pb-3 text-sm font-bold border-b-[3px] transition-colors ${activeTab === 'indicadores' ? 'border-[#1a8241] text-[#1a8241]' : 'border-transparent text-gray-500 hover:text-gray-800'}`}
              >
                Indicadores
              </button>
            </div>
          </header>

          <main className="flex-1 p-6 max-w-7xl mx-auto w-full anim-fade">
            {activeTab === 'contratos' && (
              <>
                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-6 flex items-center gap-3">
                  <i data-lucide="search" className="text-gray-400 w-5 h-5"></i>
                  <input type="text" placeholder="Buscar por nombre de la entidad / cliente..." value={search} onChange={e => setSearch(e.target.value)} className="w-full text-base outline-none text-gray-700 placeholder-gray-400 font-medium" />
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                  {filtered.map(c => (
                    <div key={c.id} onClick={() => onSelectContract(c)} className="bg-white border border-gray-200 rounded-xl p-5 cursor-pointer hover:border-[#1a8241] hover:shadow-lg transition-all group relative overflow-hidden flex flex-col justify-between min-h-[120px]">
                      <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-gray-200 group-hover:bg-[#1a8241] transition-colors"></div>
                      <div>
                        <h3 className="text-sm font-bold text-gray-800 leading-snug group-hover:text-[#1a8241] transition-colors">{c.entidad}</h3>
                      </div>
                      <div className="mt-4 flex justify-between items-center">
                        {isDirectivo && <span className="text-[10px] text-gray-400 font-bold uppercase"><i data-lucide="user" className="w-3 h-3 inline"></i> {c.ejecutivo || 'Sin Asignar'}</span>}
                        <span className={`text-xs font-semibold flex items-center gap-1 ${isDirectivo ? 'text-gray-400 group-hover:text-[#1a8241] ml-auto' : 'text-gray-400 group-hover:text-[#1a8241] ml-auto'}`}>
                          {isDirectivo ? 'Ver Detalles' : 'Gestionar Órdenes'} <i data-lucide="arrow-right" className="w-3 h-3"></i>
                        </span>
                      </div>
                    </div>
                  ))}
                  {filtered.length === 0 && (
                    <div className="col-span-full py-12 text-center text-gray-500">
                      <i data-lucide="search-x" className="w-12 h-12 mx-auto mb-3 opacity-20"></i>
                      <p>No se encontraron contratos para esta búsqueda.</p>
                    </div>
                  )}
                </div>
              </>
            )}

            {activeTab === 'indicadores' && (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                 <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                     <h3 className="text-sm font-bold text-gray-700 mb-6 flex items-center gap-2"><i data-lucide="check-circle" className="w-4 h-4 text-[#1a8241]"></i> Valor Aprobado por Contrato</h3>
                     <CustomBarChart data={aprobadoData} formatCurrency={true} />
                 </div>
                 <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                     <h3 className="text-sm font-bold text-gray-700 mb-6 flex items-center gap-2"><i data-lucide="dollar-sign" className="w-4 h-4 text-[#1a8241]"></i> Valor Facturado por Contrato</h3>
                     <CustomBarChart data={facturadoData} formatCurrency={true} />
                 </div>
                 <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 lg:col-span-2">
                     <h3 className="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2"><i data-lucide="users" className="w-4 h-4 text-[#1a8241]"></i> Proveedores con Informe de Evidencias Aprobado</h3>
                     <HorizontalBarChart data={provData} />
                 </div>
              </div>
            )}
          </main>
        </div>
      );
    };

    // --- PANTALLA 3: APLICATIVO PRINCIPAL ---
    const MainApp = ({ user, contract, onBackToContracts, dbData, setDbData, showToast }) => {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingRecord, setEditingRecord] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      
      const [paAction, setPaAction] = useState(null);
      const [paOrderNum, setPaOrderNum] = useState("");

      const formRef = useRef(null);
      const isDirectivo = user.role === 'Directivos';

      const PA_ACTIONS = ["Pedir CDP", "Pedir RP", "Solicitar Cotización", "Liberar RP", "Generar informe técnico financiero"];

      useEffect(() => { if (typeof lucide !== "undefined") lucide.createIcons(); });

      const contratoKey = dbData.headers.find(h => h.trim().toLowerCase() === 'contrato');

      const ordenesDelContrato = useMemo(() => dbData.ordenes.filter(o => {
        if (!contratoKey) return false;
        return o[contratoKey]?.toString().trim().toLowerCase() === contract.entidad.trim().toLowerCase();
      }), [dbData.ordenes, contratoKey, contract.entidad]);

      const displayHeaders = dbData.headers.filter(h => {
        const lowerH = h.trim().toLowerCase();
        return lowerH !== 'id' && lowerH !== 'contrato';
      });

      const openModal = (record = null) => {
        if(isDirectivo) return; 
        setEditingRecord(record);
        setIsModalOpen(true);
      };

      const formatNum = (num) => new Intl.NumberFormat('es-CO').format(Math.round(num));

      const handleFormChange = () => {
        const form = formRef.current;
        if(!form) return;
        
        const getField = (searchStr) => Array.from(form.elements).find(el => el.name && el.name.replace(/\s+/g, ' ').toLowerCase().includes(searchStr.toLowerCase()));

        const valFacturadoEl = getField("valor facturado");
        const valAprobadoEl = getField("valor aprobado");
        
        const honAntesIvaEl = getField("antes de iva");
        const honIvaIncEl = getField("iva incluido");
        const porLiberarEl = getField("por liberar");

        const vFacturado = valFacturadoEl ? parseNum(valFacturadoEl.value) : 0;
        const vAprobado = valAprobadoEl ? parseNum(valAprobadoEl.value) : 0;
        
        if (porLiberarEl) {
           const diff = vAprobado - vFacturado;
           porLiberarEl.value = (diff < 0 ? "-" : "") + formatNum(Math.abs(diff));
        }
        
        const admon = contract.porcentajeAdmon || 0;
        const honAntes = vFacturado * admon;
        
        if (honAntesIvaEl) {
           honAntesIvaEl.value = formatNum(honAntes);
        }
        if (honIvaIncEl) {
           honIvaIncEl.value = formatNum(honAntes * 1.19);
        }
      };

      useEffect(() => {
        if (isModalOpen) {
          setTimeout(handleFormChange, 50);
        }
      }, [isModalOpen]);

      const handleSave = (e) => {
        e.preventDefault();
        if(isDirectivo) return;

        const fd = new FormData(e.target);
        
        let newRecord = { id: editingRecord ? editingRecord.id : "" };
        if (contratoKey) { newRecord[contratoKey] = contract.entidad; } 
        else { newRecord['Contrato'] = contract.entidad; }
        
        for (let [key, value] of fd.entries()) { 
          const keyLower = key.replace(/\s+/g, ' ').toLowerCase().trim();
          const isStrictNumeric = [
            "valor facturado", "factura proveedor", "valor honorarios iva incluido",
            "honorarios antes de iva", "por liberar", "valor aprobado"
          ].some(n => keyLower.includes(n));

          if (isStrictNumeric) {
            newRecord[key] = value.toString().replace(/\./g, '');
          } else {
            newRecord[key] = value; 
          }
        }

        const admon = contract.porcentajeAdmon || 0;
        const vFacturado = parseNum(newRecord[Object.keys(newRecord).find(k => k.replace(/\s+/g, ' ').toLowerCase().includes("valor facturado"))] || 0);
        const vAprobado = parseNum(newRecord[Object.keys(newRecord).find(k => k.replace(/\s+/g, ' ').toLowerCase().includes("valor aprobado"))] || 0);
        
        const keyAntesIva = Object.keys(newRecord).find(k => k.replace(/\s+/g, ' ').toLowerCase().includes("antes de iva"));
        const keyIvaInc = Object.keys(newRecord).find(k => k.replace(/\s+/g, ' ').toLowerCase().includes("iva incluido"));
        const keyLiberar = Object.keys(newRecord).find(k => k.replace(/\s+/g, ' ').toLowerCase().includes("por liberar"));
        const keyEjecutivo = Object.keys(newRecord).find(k => k.replace(/\s+/g, ' ').toLowerCase() === "ejecutivo");

        if (keyAntesIva) newRecord[keyAntesIva] = Math.round(vFacturado * admon);
        if (keyIvaInc) newRecord[keyIvaInc] = Math.round(vFacturado * admon * 1.19);
        if (keyLiberar) newRecord[keyLiberar] = Math.round(vAprobado - vFacturado);
        if (keyEjecutivo && !newRecord[keyEjecutivo]) newRecord[keyEjecutivo] = user.name;

        const previousOrdenes = [...dbData.ordenes];

        let updatedOrdenes = [...dbData.ordenes];
        if (editingRecord) {
          updatedOrdenes = updatedOrdenes.map(x => x.id === editingRecord.id ? newRecord : x);
        } else {
          newRecord.id = "temp-" + Date.now();
          updatedOrdenes.push(newRecord);
        }
        setDbData({ ...dbData, ordenes: updatedOrdenes });
        setIsModalOpen(false);
        setIsSyncing(true);

        fetch(GOOGLE_SHEETS_WEBAPP_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'save', record: newRecord })
        })
        .then(res => res.json())
        .then(res => {
          if(res.status === 'success') showToast(editingRecord ? "Orden actualizada" : "Orden creada");
          else {
            setDbData({ ...dbData, ordenes: previousOrdenes });
            showToast("Error al guardar en la base de datos: " + res.message, "error");
          }
        })
        .catch(err => {
          setDbData({ ...dbData, ordenes: previousOrdenes });
          showToast("Error de conexión con la base de datos", "error");
        })
        .finally(() => setIsSyncing(false));
      };

      const handleDelete = (id) => {
        if (isDirectivo) return;
        if (!confirm("¿Eliminar esta orden permanentemente?")) return;
        
        const previousOrdenes = [...dbData.ordenes];

        setDbData({ ...dbData, ordenes: dbData.ordenes.filter(x => x.id !== id) });
        setIsSyncing(true);

        fetch(GOOGLE_SHEETS_WEBAPP_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'delete', record: { id: id } })
        })
        .then(res => res.json())
        .then(res => {
          if(res.status === 'success') showToast("Orden eliminada");
          else {
            setDbData({ ...dbData, ordenes: previousOrdenes });
            showToast("Error al eliminar en la base de datos: " + res.message, "error");
          }
        })
        .catch(err => {
          setDbData({ ...dbData, ordenes: previousOrdenes });
          showToast("Error de conexión con la base de datos", "error");
        })
        .finally(() => setIsSyncing(false));
      };

      const exportData = () => {
        if(ordenesDelContrato.length === 0) { showToast("No hay órdenes para exportar", "error"); return; }
        const ws = XLSX.utils.json_to_sheet(ordenesDelContrato);
        const wb = XLSX.utils.book_new();
        
        const range = XLSX.utils.decode_range(ws['!ref']);
        ws['!cols'] = Object.keys(ordenesDelContrato[0] || {}).map(() => ({ wch: 22 }));

        for (let R = range.s.r; R <= range.e.r; ++R) {
          for (let C = range.s.c; C <= range.e.c; ++C) {
            const cell_ref = XLSX.utils.encode_cell({ c: C, r: R });
            if (!ws[cell_ref]) continue;
            if (!ws[cell_ref].s) ws[cell_ref].s = {};

            ws[cell_ref].s.border = {
              top: { style: "thin", color: { rgb: "000000" } },
              bottom: { style: "thin", color: { rgb: "000000" } },
              left: { style: "thin", color: { rgb: "000000" } },
              right: { style: "thin", color: { rgb: "000000" } }
            };

            if (R === 0) {
              ws[cell_ref].s.fill = { patternType: "solid", fgColor: { rgb: "1A8241" } };
              ws[cell_ref].s.font = { bold: true, color: { rgb: "FFFFFF" } };
              ws[cell_ref].s.alignment = { horizontal: "center", vertical: "center" };
            }
          }
        }

        XLSX.utils.book_append_sheet(wb, ws, "Órdenes");
        XLSX.writeFile(wb, `Ordenes_${contract.entidad.substring(0,20).replace(/[^a-z0-9]/gi, '_')}.xlsx`);
      };

      // Manejador FETCH PARA POWER AUTOMATE

        try {

            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

                   </div>
                   <div className="flex flex-col">

                         if (!val || val === '') return '-';
                         const cleanStr = val.toString().replace(/[$ \s]/g, '');
                         const num = parseFloat(cleanStr.includes(',') ? cleanStr.replace(/\./g, '').replace(',', '.') : ((cleanStr.match(/\./g) || []).length >= 1 ? cleanStr.replace(/\./g, '') : cleanStr));
                         return isNaN(num) ? val : new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(num);
                       })()
                     }</span>
                   </div>
                   <div className="flex flex-col">
                     <span className="text-[10px] uppercase font-bold text-gray-400" title="Total Honorarios">Total Honorarios</span>
                     <span className="font-medium text-gray-800">{
                       (() => {
                         const val = contract[Object.keys(contract).find(k => k.toLowerCase().trim() === 'total honorarios')];
                         if (!val || val === '') return '-';
                         const cleanStr = val.toString().replace(/[$ \s]/g, '');
                         const num = parseFloat(cleanStr.includes(',') ? cleanStr.replace(/\./g, '').replace(',', '.') : ((cleanStr.match(/\./g) || []).length >= 1 ? cleanStr.replace(/\./g, '') : cleanStr));
                         return isNaN(num) ? val : new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(num);

                   </div>
                   <div className="flex flex-col">

                     <span className="font-medium text-gray-800">{

                         if (!val || val === '') return '-';
                         const cleanStr = val.toString().replace(/[$ \s]/g, '');
                         const num = parseFloat(cleanStr.includes(',') ? cleanStr.replace(/\./g, '').replace(',', '.') : ((cleanStr.match(/\./g) || []).length >= 1 ? cleanStr.replace(/\./g, '') : cleanStr));
                         return isNaN(num) ? val : new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(num);
                       })()

                   <div className="flex flex-col">
                     <span className="text-[10px] uppercase font-bold text-gray-400" title="Total contrato">Total Contrato</span>
                     <span className="font-bold text-[#1a8241]">{
                       (() => {
                         const val = contract[Object.keys(contract).find(k => k.toLowerCase().trim() === 'total contrato')];
                         if (!val || val === '') return '-';
                         const cleanStr = val.toString().replace(/[$ \s]/g, '');
                         const num = parseFloat(cleanStr.includes(',') ? cleanStr.replace(/\./g, '').replace(',', '.') : ((cleanStr.match(/\./g) || []).length >= 1 ? cleanStr.replace(/\./g, '') : cleanStr));
                         return isNaN(num) ? val : new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(num);
                       })()
                     }</span>
                   </div>
                </div>
              </div>

              <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-5">
                 <h3 className="text-sm font-bold text-gray-700 mb-4 border-b border-gray-100 pb-2 flex items-center gap-2">
                   <i data-lucide="zap" className="w-4 h-4 text-indigo-500"></i> Acciones Automatizadas (Flujos)
                 </h3>
                 <div className="flex flex-wrap gap-3">
                   {PA_ACTIONS.map(act => (
                     <button key={act} onClick={() => setPaAction(act)} className="px-4 py-2 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 rounded-lg text-xs font-bold flex items-center gap-2 transition-colors border border-indigo-100 shadow-sm hover:shadow">
                       <i data-lucide="send" className="w-3.5 h-3.5"></i> {act}
                     </button>
                   ))}
                 </div>
              </div>

              <div className="flex flex-col sm:flex-row justify-between items-center mb-5 gap-4 bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <div className="flex items-center gap-4">
                  <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <i data-lucide="list" className="text-[#1a8241]"></i> Listado de Órdenes
                  </h2>
                </div>
                <div className="flex gap-3">
                  <button onClick={exportData} className="px-4 py-2 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors border border-blue-200">
                    <i data-lucide="download" className="w-4 h-4"></i> Exportar

                  {!isDirectivo && (
                    <button onClick={() => openModal()} disabled={isSyncing} className="px-4 py-2 bg-[#1a8241] text-white hover:bg-green-800 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed">

                      <tr>
                        {displayHeaders.map(h => (
                          <th key={h} className="p-3 border-r border-green-600/50 uppercase text-xs">{h}</th>

                        {!isDirectivo && <th className="p-3 uppercase text-xs text-center sticky right-0 bg-[#1a8241] z-10">Acciones</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {ordenesDelContrato.length === 0 ? (
                        <tr><td colSpan={displayHeaders.length + 1} className="text-center py-10 text-gray-500 font-medium">No hay órdenes registradas en este contrato.</td></tr>
                      ) : (
                        ordenesDelContrato.map((ord, i) => (
                          <tr key={ord.id} className={`${i % 2 === 0 ? "bg-white" : "bg-gray-50"} hover:bg-green-50 border-b border-gray-100`}>
                            {displayHeaders.map(h => {
                              let cellData = ord[h];
                              const normalizedH = h.replace(/\s+/g, ' ').toLowerCase();
                              
                              const isStrictNumeric = [
                                "valor facturado", "factura proveedor", "valor honorarios iva incluido",
                                "honorarios antes de iva", "por liberar", "valor aprobado"
                              ].some(n => normalizedH.includes(n));

                              if (isStrictNumeric && cellData) {
                                let cleanStr = cellData.toString().replace(/[$ \s]/g, '');
                                if (cleanStr.includes(',')) {
                                  cleanStr = cleanStr.replace(/\./g, '').replace(',', '.');
                                } else if ((cleanStr.match(/\./g) || []).length >= 1) {
                                  const lastDotIndex = cleanStr.lastIndexOf('.');
                                  if (cleanStr.length - lastDotIndex === 4) {
                                    cleanStr = cleanStr.replace(/\./g, '');
                                  }
                                }
                                const num = parseFloat(cleanStr);
                                if (!isNaN(num)) {
                                  cellData = new Intl.NumberFormat('es-CO').format(num);
                                }
                              }

                              return (
                                <td key={h} className="p-3 text-gray-700 max-w-[300px] truncate" title={cellData}>

                <div className="flex justify-between items-center mb-5 border-b border-gray-100 pb-3">

                    {editingRecord ? `Editar Orden` : `Nueva Orden de Pedido`}
                  </h2>
                  <div className="text-xs font-bold text-[#1a8241] bg-green-50 px-3 py-1 rounded">
                    % Admón del Contrato: {((contract.porcentajeAdmon || 0) * 100).toFixed(1)}%
                  </div>
                  <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-gray-800"><i data-lucide="x" className="w-5 h-5"></i></button>
                </div>

                <form ref={formRef} onSubmit={handleSave} onChange={handleFormChange} className="space-y-4 max-h-[70vh] overflow-y-auto px-1">
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {displayHeaders.map(h => {
                      const headerLower = h.replace(/\s+/g, ' ').toLowerCase().trim();
                      
                      const isStrictNumeric = [
                        "valor facturado", "factura proveedor", "valor honorarios iva incluido",
                        "honorarios antes de iva", "por liberar", "valor aprobado"
                      ].some(n => headerLower.includes(n));

                      const isAutomaticMath = headerLower.includes("antes de iva") || headerLower.includes("iva incluido") || headerLower.includes("por liberar");
                      const isAutoEjecutivo = headerLower === "ejecutivo";
                      const isAutoNombreProv = headerLower.includes("nombre proveedor");
                      const isReadOnly = isAutomaticMath || isAutoEjecutivo || isAutoNombreProv;
                      
                      const isRequired = COLUMNAS_OBLIGATORIAS.includes(headerLower) && !isReadOnly;
                      
                      const listKey = Object.keys(dbData.listas || {}).find(k => k.replace(/\s+/g, ' ').toLowerCase().trim() === headerLower);
                      const listOptions = listKey ? dbData.listas[listKey] : null;

                      let inputType = "text";
                      if (headerLower.includes("fecha")) inputType = "date";
                      else if (headerLower.includes("cantidad") || headerLower.includes("precio") || headerLower === "cdp" || headerLower === "rp") inputType = "number";

                      return (
                        <div key={h} className={headerLower.includes("observacion") || headerLower.includes("descripci") || headerLower.includes("evento") ? "md:col-span-2 lg:col-span-3" : ""}>
                          <label className="block text-[11px] font-bold text-gray-500 uppercase mb-1 flex items-center justify-between">

                            {isReadOnly && <i data-lucide="lock" title="Campo automático" className="w-3 h-3 text-gray-400"></i>}
                          </label>
                          
                          {headerLower.includes("contrato proveedor") ? (
                            <SearchableSelect 
                              name={h}
                              options={listOptions || []}
                              defaultValue={editingRecord?.[h] || ""}
                              required={isRequired}
                              className={`w-full p-2.5 border border-gray-300 rounded-lg outline-none text-sm focus:ring-1 focus:ring-[#1a8241] bg-gray-50`}
                              onSelect={(val) => {
                                const form = formRef.current;
                                if(form) {
                                  const cpKey = Object.keys(dbData.listas || {}).find(k => k.replace(/\s+/g, ' ').toLowerCase().trim() === 'contrato proveedor');

                                  const nombreEl = Array.from(form.elements).find(el => el.name && el.name.replace(/\s+/g, ' ').toLowerCase().includes("nombre proveedor"));
                                  
                                  if(cpKey && npKey && nombreEl) {
                                    const index = dbData.listas[cpKey].indexOf(val);
                                    if (index !== -1) {
                                      nombreEl.value = dbData.listas[npKey][index] || "";
                                    } else {
                                      nombreEl.value = "";
                                    }
                                  }
                                }
                              }}
                            />
                          ) : listOptions && !isReadOnly ? (
                            <select name={h} required={isRequired} defaultValue={editingRecord?.[h] || ""} className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-1 focus:ring-[#1a8241] outline-none text-sm bg-gray-50">
                              <option value="" disabled>Seleccione una opción...</option>
                              {listOptions.map((opt, idx) => (
                                <option key={idx} value={opt}>{opt}</option>
                              ))}
                            </select>
                          ) : headerLower.includes("observacion") || headerLower.includes("descripci") ? (
                            <textarea name={h} required={isRequired} readOnly={isReadOnly} defaultValue={editingRecord?.[h] || ""} className={`w-full p-2.5 border border-gray-300 rounded-lg outline-none text-sm resize-y min-h-[80px] ${isReadOnly ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : 'focus:ring-1 focus:ring-[#1a8241] bg-gray-50'}`}></textarea>
                          ) : (
                            <input 
                              type={isStrictNumeric ? "text" : inputType} 
                              step={inputType==="number" ? "any" : undefined} 
                              name={h} 
                              inputMode={isStrictNumeric ? "numeric" : undefined}
                              readOnly={isReadOnly}
                              required={isRequired} 
                              defaultValue={
                                isAutoEjecutivo && !editingRecord ? user.name : 
                                (inputType === "date" ? formatDateForInput(editingRecord?.[h]) :
                                (isStrictNumeric && editingRecord?.[h] ? new Intl.NumberFormat('es-CO').format(parseInt(editingRecord[h].toString().replace(/\D/g, ''), 10) || 0) : (editingRecord?.[h] || "")))
                              } 
                              onInput={(e) => {
                                if (isStrictNumeric) {
                                  let isNeg = e.target.value.startsWith('-');
                                  let rawValue = e.target.value.replace(/\D/g, '');
                                  let formatted = rawValue ? new Intl.NumberFormat('es-CO').format(parseInt(rawValue, 10)) : '';
                                  e.target.value = isNeg && formatted ? '-' + formatted : formatted;
                                }
                                handleFormChange();
                              }}
                              className={`w-full p-2.5 border border-gray-300 rounded-lg outline-none text-sm transition-colors ${isReadOnly ? 'bg-gray-100 text-gray-500 cursor-not-allowed font-medium' : 'focus:ring-1 focus:ring-[#1a8241] bg-gray-50'}`} 
                            />
                          )}
                        </div>
                      );
                    })}
                  </div>

                  <div className="pt-4 flex justify-end gap-3 border-t border-gray-100 mt-6 sticky bottom-0 bg-white pb-2">
                    <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 rounded-lg text-sm font-bold text-gray-600 hover:bg-gray-100 transition-colors">Cancelar</button>
                    <button type="submit" disabled={isSyncing} className="px-5 py-2.5 bg-[#1a8241] text-white rounded-lg text-sm font-bold hover:bg-green-800 transition-colors flex items-center gap-2 disabled:opacity-50">
                      <i data-lucide="save" className="w-4 h-4"></i> Guardar
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- CONTENEDOR PRINCIPAL ---
    function App() {
      const [user, setUser] = useState(null);
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);
      const [contract, setContract] = useState(null);
      const [toast, setToast] = useState(null);

      const [dbData, setDbData] = useState({ contratos: [], ordenes: [], headers: [], usuarios: [], listas: {} });
      const [loadingDb, setLoadingDb] = useState(true);

      const showToast = (message, type = "success") => setToast({ message, type, key: Date.now() });

      useEffect(() => {
        if (!GOOGLE_SHEETS_WEBAPP_URL || GOOGLE_SHEETS_WEBAPP_URL === "PEGAR_AQUI_LA_URL_DE_APPS_SCRIPT") {
          setLoadingDb(false);
          return;
        }
        
        fetch(GOOGLE_SHEETS_WEBAPP_URL)
          .then(res => res.json())
          .then(data => {
             if(data.status === 'success') {
               setDbData({ 
                 contratos: data.contratos || [], 
                 ordenes: data.ordenes || [], 
                 headers: data.headers || [], 
                 usuarios: data.usuarios || [],
                 listas: data.listas || {}
               });
             } else {
               showToast("Error de la BD: " + data.message, "error");
             }
             setLoadingDb(false);
          })
          .catch(e => {
             showToast("Fallo al conectar con la base de datos", "error");
             setLoadingDb(false);
          });
      }, []);

      const handleLogin = (ejecutivo, password) => {
        setLoading(true);
        setError(null);
        setTimeout(() => {
          const usuarioEncontrado = dbData.usuarios?.find(u => u.ejecutivo.toLowerCase() === ejecutivo.toLowerCase());
          
          let authExitosa = false;
          if (usuarioEncontrado) {
            authExitosa = (usuarioEncontrado.password === password);
          } else {
            authExitosa = (ejecutivo === "Katheryn Zapata" && password === "Activa2026*") || (ejecutivo === "Directivos" && password === "Activa2026*");
          }

          if (authExitosa) {
            setUser({ name: ejecutivo, role: ejecutivo === "Directivos" ? "Directivos" : "Ejecutivo" });
          } else {
            setError("Contraseña incorrecta para este perfil.");
          }
          setLoading(false);
        }, 800);
      };

      const handleLogout = () => {
        setUser(null);
        setContract(null);
      };

      if (loadingDb) {
        return (
          <div className="min-h-screen bg-[#f8f9fa] flex flex-col items-center justify-center p-4">
            <i data-lucide="refresh-cw" className="w-10 h-10 text-[#1a8241] animate-spin mb-4"></i>
            <h2 className="text-xl font-bold text-gray-700">Conectando con la base de datos...</h2>
            <p className="text-gray-500 mt-2 text-center text-sm max-w-md">Por favor, espera mientras sincronizamos la información de contratos y listas.</p>
          </div>
        );
      }

      if (!user) return <LoginScreen onLogin={handleLogin} error={error} loading={loading} usuariosDisponibles={dbData.usuarios} />;

      if (dbData.contratos.length === 0) {
        return (
          <div className="min-h-screen bg-[#f8f9fa] flex flex-col items-center justify-center p-4 text-center">
             <i data-lucide="alert-triangle" className="w-12 h-12 text-yellow-500 mb-4"></i>
             <h2 className="text-xl font-bold text-gray-800">Conexión Incompleta o Sin Datos</h2>
             <p className="text-gray-600 mt-2">No se encontraron contratos registrados. Asegúrate de tener datos en la hoja 'Contratos'.</p>
          </div>
        );
      }

      if (!contract) return (
        <>
          <ContractSelection user={user} onSelectContract={setContract} onLogout={handleLogout} dbData={dbData} />
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </>
      );
      
      return <MainApp user={user} contract={contract} onBackToContracts={() => setContract(null)} dbData={dbData} setDbData={setDbData} showToast={showToast} />;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
