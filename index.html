<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguimiento a Tareas - ACTIVA</title>
  
  <!-- Tailwind CSS para los estilos -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React y ReactDOM para la lógica de la interfaz -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel para compilar el código en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Iconos Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Script Principal de la Aplicación -->
  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    const INITIAL_TASKS = [];

    const DEPARTMENTS = [
      "Todas las Tareas",
      "Gerencia",
      "Subgerencia Comercial",
      "Dirección Jurídica",
      "Dirección Administrativa y Financiera",
      "Comunicaciones",
      "Indicadores" // NUEVO APARTADO
    ];

    const PROFILE_IMAGES = {
      "Todas las Tareas": "todas.png",
      "Gerencia": "gerencia.png",
      "Subgerencia Comercial": "comercial.png",
      "Dirección Jurídica": "juridica.png",
      "Dirección Administrativa y Financiera": "administrativa.png",
      "Comunicaciones": "comunicaciones.png",
      "Indicadores": "indicadores.png" // NUEVA IMAGEN
    };

    const GOOGLE_SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzVfa5IF2L728f-tRSlT270ZEsg1RDJ9BX7htrnGzD_3MlNthdew-UIIu3lXw6taRY/exec"; 

    // --- Componentes de Gráficas ---
    const GaugeChart = ({ value, total }) => {
      const radius = 90;
      const circumference = Math.PI * radius; 
      const percentage = total === 0 ? 0 : (value / total);
      const dashoffset = circumference - (percentage * circumference);

      return (
        <div className="relative flex flex-col items-center justify-center h-48 w-64">
          <svg className="w-full h-full" viewBox="0 0 200 120">
            <path d="M 10 100 A 90 90 0 0 1 190 100" fill="none" stroke="#e5e7eb" strokeWidth="20" strokeLinecap="butt" />
            <path
              d="M 10 100 A 90 90 0 0 1 190 100"
              fill="none"
              stroke="#1a8241"
              strokeWidth="20"
              strokeLinecap="butt"
              strokeDasharray={circumference}
              strokeDashoffset={dashoffset}
              className="transition-all duration-1000 ease-out"
            />
          </svg>
          <div className="absolute bottom-6 flex items-baseline space-x-1">
            <span className="text-5xl font-semibold text-black">{value}</span>
          </div>
          <div className="absolute bottom-2 left-2 text-sm text-gray-500">0</div>
          <div className="absolute bottom-2 right-2 text-sm text-gray-500">{total}</div>
        </div>
      );
    };

    const DoughnutChart = ({ data }) => {
      let cumulativePercent = 0;
      const total = data.reduce((acc, d) => acc + d.value, 0);
      
      if (total === 0) return <div className="h-48 flex items-center justify-center text-gray-400">Sin datos</div>;

      return (
        <div className="flex items-center h-48 w-full gap-4">
          <div className="w-32 h-32 relative">
            <svg viewBox="0 0 42 42" className="w-full h-full transform -rotate-90">
              <circle cx="21" cy="21" r="15.91549430918954" fill="transparent" stroke="#e5e7eb" strokeWidth="6"></circle>
              {data.map(slice => {
                const percent = (slice.value / total) * 100;
                if (percent === 0) return null;
                const offset = 100 - cumulativePercent;
                cumulativePercent += percent;
                return (
                  <circle
                    key={slice.label}
                    cx="21" cy="21" r="15.91549430918954"
                    fill="transparent"
                    stroke={slice.color}
                    strokeWidth="6"
                    strokeDasharray={`${percent} ${100 - percent}`}
                    strokeDashoffset={offset}
                    className="transition-all duration-1000 ease-out"
                  />
                );
              })}
            </svg>
          </div>
          <div className="flex flex-col gap-2 flex-1">
            {data.map(d => (
              <div key={d.label} className="flex items-center justify-between text-xs">
                <div className="flex items-center gap-1.5">
                  <span className="w-3 h-3 rounded-full" style={{ backgroundColor: d.color }}></span>
                  <span className="text-gray-600 truncate max-w-[80px]" title={d.label}>{d.label}</span>
                </div>
                <span className="font-semibold">{d.value}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const CustomBarChart = ({ data }) => {
      const max = Math.max(...data.map(d => d.value), 1);
      if (data.length === 0) return <div className="h-48 flex items-center justify-center text-gray-400">Sin datos</div>;

      return (
        <div className="flex items-end justify-around h-48 w-full gap-2 mt-2">
          {data.map((item, index) => (
            <div key={index} className="flex flex-col items-center flex-1 group">
              <div
                className="w-full max-w-[40px] bg-[#1a8241] rounded-t transition-all duration-1000 ease-out relative hover:bg-green-600"
                style={{ height: `${(item.value / max) * 100}%`, minHeight: item.value > 0 ? '4px' : '0' }}
              >
                 <div className="absolute -top-7 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10 whitespace-nowrap">
                    {item.value} {item.value === 1 ? 'tarea' : 'tareas'}
                 </div>
              </div>
              <span className="text-[10px] text-gray-500 mt-2 text-center truncate w-full px-1" title={item.label}>
                {item.label.split(' ')[0]}
              </span>
            </div>
          ))}
        </div>
      );
    };

    // --- Aplicación Principal ---
    function App() {
      const [tasks, setTasks] = useState(INITIAL_TASKS);
      const [indicadoresList, setIndicadoresList] = useState(["Satisfacción del Cliente", "Cumplimiento Legal", "Financiero", "Operativo"]);
      
      const [selectedDept, setSelectedDept] = useState("Todas las Tareas");
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      const [columnFilters, setColumnFilters] = useState({});
      const [modalAvance, setModalAvance] = useState(0);
      
      const [activeFilter, setActiveFilter] = useState(null);
      const [filterSearch, setFilterSearch] = useState("");
      const filterRef = useRef(null);

      // Renderizar iconos de Lucide
      useEffect(() => {
        lucide.createIcons();
      });

      const openModal = (task = null) => {
        setEditingTask(task);
        // Filtramos para evitar que envíe "NaN"
        setModalAvance(task ? parseInt(task.avance) || 0 : 0);
        setIsModalOpen(true);
      };

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (filterRef.current && !filterRef.current.contains(event.target)) {
            setActiveFilter(null);
          }
        };
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, []);

      useEffect(() => {
        const fetchFromGoogleSheets = async () => {
          if (!GOOGLE_SHEETS_WEBAPP_URL) return;
          setIsSyncing(true);
          try {
            const response = await fetch(GOOGLE_SHEETS_WEBAPP_URL);
            const data = await response.json();
            
            if (data.tasks && data.tasks.length > 0) setTasks(data.tasks);
            if (data.indicadores && data.indicadores.length > 0) setIndicadoresList(data.indicadores);

          } catch (error) {
            console.error("Error al cargar datos automáticos:", error);
          } finally {
            setIsSyncing(false);
          }
        };
        fetchFromGoogleSheets();
      }, []);

      const filteredTasks = useMemo(() => {
        let result = tasks;
        
        if (selectedDept !== "Todas las Tareas" && selectedDept !== "Indicadores") {
          result = result.filter(t => t.responsablePrincipal === selectedDept || t.responsableSecundario === selectedDept);
        }
        
        Object.keys(columnFilters).forEach(key => {
          const selectedValues = columnFilters[key];
          if (selectedValues && Array.isArray(selectedValues)) {
            result = result.filter(t => selectedValues.includes(t[key]?.toString() || ""));
          }
        });
        
        return result;
      }, [tasks, selectedDept, columnFilters]);

      const hasActiveFilters = Object.keys(columnFilters).length > 0;

      const totalTasks = filteredTasks.length;
      const completedTasks = filteredTasks.filter(t => t.estado === 'Finalizado' || parseInt(t.avance) === 100).length;
      const inProgressTasks = filteredTasks.filter(t => t.estado === 'En Progreso').length;
      const delayedTasks = filteredTasks.filter(t => t.estado === 'Retrasado').length;
      const pendingTasks = filteredTasks.filter(t => t.estado === 'Pendiente').length;
      
      const completionPercentage = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);

      const statusData = [
        { label: 'Finalizado', value: completedTasks, color: '#1a8241' }, 
        { label: 'En Progreso', value: inProgressTasks, color: '#3b82f6' }, 
        { label: 'Pendiente', value: pendingTasks, color: '#facc15' }, 
        { label: 'Retrasado', value: delayedTasks, color: '#ef4444' } 
      ];

      const areaData = useMemo(() => {
        const counts = {};
        DEPARTMENTS.slice(1, -1).forEach(d => counts[d] = 0); // Excluir "Indicadores" y "Todas"
        filteredTasks.forEach(t => {
          if (counts[t.responsablePrincipal] !== undefined) counts[t.responsablePrincipal]++;
        });
        return Object.keys(counts).map(k => ({ label: k, value: counts[k] }));
      }, [filteredTasks]);

      // Dashboard exclusivo para la vista de Indicadores
      const renderIndicatorDashboard = () => {
        // Agrupar y calcular promedios
        const stats = {};
        tasks.forEach(t => {
          const ind = t.indicador && t.indicador.trim() !== "" ? t.indicador : 'Sin Asignar';
          if (!stats[ind]) stats[ind] = { totalAvance: 0, count: 0, completed: 0 };
          stats[ind].totalAvance += (parseInt(t.avance) || 0);
          stats[ind].count += 1;
          if(t.estado === 'Finalizado' || parseInt(t.avance) === 100) stats[ind].completed += 1;
        });
        
        const chartData = Object.keys(stats).map(k => ({
          label: k,
          value: Math.round(stats[k].totalAvance / stats[k].count), // Promedio de avance
          count: stats[k].count,
          completed: stats[k].completed
        })).sort((a,b) => b.value - a.value);

        return (
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
              <h3 className="text-sm font-bold text-[#1a8241] flex items-center gap-2 mb-6">
               <i data-lucide="target" className="w-5 h-5"></i> Cumplimiento Promedio por Indicador
              </h3>
              <div className="space-y-5">
                {chartData.map((item, idx) => (
                  <div key={idx}>
                    <div className="flex justify-between text-xs mb-1">
                      <span className="font-semibold text-gray-700">{item.label}</span>
                      <span className="font-bold text-[#1a8241] text-sm">{item.value}%</span>
                    </div>
                    <div className="w-full bg-gray-100 rounded-full h-3">
                      <div className="bg-[#1a8241] h-3 rounded-full transition-all duration-1000 relative overflow-hidden" style={{width: `${item.value}%`}}>
                         <div className="absolute top-0 right-0 bottom-0 left-0 bg-white/20 w-full animate-pulse"></div>
                      </div>
                    </div>
                    <p className="text-[11px] text-gray-500 mt-1">{item.completed} de {item.count} tareas completadas al 100%</p>
                  </div>
                ))}
                {chartData.length === 0 && <p className="text-xs text-gray-500">No hay indicadores registrados en las tareas.</p>}
              </div>
            </div>
            
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
              <h3 className="text-sm font-bold text-[#1a8241] flex items-center gap-2 mb-6">
               <i data-lucide="bar-chart" className="w-5 h-5"></i> Distribución de Tareas por Indicador
              </h3>
              <CustomBarChart data={chartData.map(d => ({label: d.label, value: d.count}))} />
            </div>
          </div>
        );
      };

      const handleSaveTask = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const newTask = {
          id: editingTask ? editingTask.id : Date.now(),
          responsablePrincipal: formData.get('responsablePrincipal'),
          responsableSecundario: formData.get('responsableSecundario'),
          compromiso: formData.get('compromiso'),
          fechaInicio: formData.get('fechaInicio'),
          fechaFin: formData.get('fechaFin'),
          estado: formData.get('estado'),
          observaciones: formData.get('observaciones'),
          avance: parseInt(formData.get('avance') || '0', 10),
          contexto: formData.get('contexto'),
          indicador: formData.get('indicador')
        };

        const newTasks = editingTask 
          ? tasks.map(t => t.id === editingTask.id ? newTask : t)
          : [...tasks, newTask];
          
        setTasks(newTasks);
        setIsModalOpen(false);
        
        if (GOOGLE_SHEETS_WEBAPP_URL) {
          try {
            await fetch(GOOGLE_SHEETS_WEBAPP_URL, { method: 'POST', body: JSON.stringify(newTasks) });
          } catch (error) {
            console.error("Error al guardar en Sheets");
          }
        }
      };

      const handleDelete = async (id) => {
        if(window.confirm("¿Estás seguro de eliminar esta tarea?")) {
          const newTasks = tasks.filter(t => t.id !== id);
          setTasks(newTasks);
          
          if (GOOGLE_SHEETS_WEBAPP_URL) {
            try {
              await fetch(GOOGLE_SHEETS_WEBAPP_URL, { method: 'POST', body: JSON.stringify(newTasks) });
            } catch (error) {
               console.error("Error al eliminar en Sheets");
            }
          }
        }
      };

      const renderHeader = (columnKey, title, extraClasses = "") => {
        const uniqueValues = [...new Set(tasks.map(t => t[columnKey]?.toString() || ""))].sort();
        
        const isFilterActive = columnFilters[columnKey] !== undefined;
        const currentSelected = columnFilters[columnKey] || uniqueValues;
        const filteredOptions = uniqueValues.filter(val => val.toLowerCase().includes(filterSearch.toLowerCase()));

        const handleToggleValue = (val) => {
           let newSelected;
           if (currentSelected.includes(val)) {
             newSelected = currentSelected.filter(v => v !== val);
           } else {
             newSelected = [...currentSelected, val];
           }
           
           if (newSelected.length === uniqueValues.length) {
              const newFilters = {...columnFilters};
              delete newFilters[columnKey];
              setColumnFilters(newFilters);
           } else {
              setColumnFilters({...columnFilters, [columnKey]: newSelected});
           }
        };

        const handleSelectAll = () => {
           const newFilters = {...columnFilters};
           delete newFilters[columnKey];
           setColumnFilters(newFilters);
        };

        const handleClearAll = () => {
           setColumnFilters({...columnFilters, [columnKey]: []});
        };

        return (
          <th key={columnKey} className={`p-3 border-r border-green-600/50 relative cursor-pointer select-none ${extraClasses}`} ref={activeFilter === columnKey ? filterRef : null}>
             <div className="flex justify-between items-center group" onClick={() => {
                if (activeFilter === columnKey) setActiveFilter(null);
                else { setActiveFilter(columnKey); setFilterSearch(""); }
             }}>
               <span className="uppercase">{title}</span>
               <i data-lucide="filter" className={`w-3.5 h-3.5 transition-colors ${isFilterActive ? "text-yellow-300 opacity-100" : "opacity-40 group-hover:opacity-80"}`}></i>
             </div>
             
             {activeFilter === columnKey && (
                <div className="absolute top-full left-0 mt-1 bg-white border border-gray-200 shadow-xl rounded-lg w-56 z-50 text-gray-800 font-normal cursor-default" onClick={e => e.stopPropagation()}>
                   <div className="p-2 border-b border-gray-100">
                      <input 
                        type="text" 
                        placeholder="Buscar..." 
                        className="w-full border border-gray-300 p-1.5 text-xs rounded-md focus:outline-none focus:ring-1 focus:ring-[#1a8241]"
                        value={filterSearch}
                        onChange={e => setFilterSearch(e.target.value)}
                      />
                   </div>
                   <div className="p-2 border-b border-gray-100 flex justify-between text-xs text-[#1a8241]">
                      <button onClick={handleSelectAll} className="hover:underline font-medium">Seleccionar todo</button>
                      <button onClick={handleClearAll} className="hover:underline font-medium text-gray-500">Ninguno</button>
                   </div>
                   <div className="max-h-48 overflow-y-auto p-2 space-y-1">
                      {filteredOptions.length === 0 ? (
                         <div className="text-xs text-gray-400 text-center py-2">Sin resultados</div>
                      ) : (
                         filteredOptions.map(val => (
                           <label key={val} className="flex items-center gap-2 text-xs cursor-pointer hover:bg-gray-50 p-1.5 rounded-md">
                              <input 
                                type="checkbox" 
                                checked={currentSelected.includes(val)} 
                                onChange={() => handleToggleValue(val)}
                                className="accent-[#1a8241] w-3.5 h-3.5 rounded-sm"
                              />
                              <span className="truncate">{val || "(Vacío)"}</span>
                           </label>
                         ))
                      )}
                   </div>
                   <div className="p-2 border-t border-gray-100 bg-gray-50 flex justify-end rounded-b-lg">
                      <button onClick={() => setActiveFilter(null)} className="text-xs bg-[#1a8241] hover:bg-green-800 text-white px-4 py-1.5 rounded-md shadow-sm transition-colors font-medium">Cerrar</button>
                   </div>
                </div>
             )}
          </th>
        );
      };

      return (
        <div className="min-h-screen bg-[#f8f9fa] font-sans text-gray-800 flex flex-col">
          
          <header className="bg-[#e0e1dd] py-3 px-6 flex justify-between items-center border-b border-gray-200">
            <div className="flex items-center gap-4">
              <img 
                src="logo.png" 
                alt="Logo ACTIVA" 
                className="h-10 w-auto" 
                onError={(e) => e.target.style.display = 'none'} 
              />
              <h1 className="text-xl md:text-2xl font-bold text-[#1a8241]">
                Seguimiento a Tareas - Empresa de Parques y Eventos de Antioquia ACTIVA
              </h1>
            </div>
          </header>

          <div className="flex flex-1 overflow-hidden">
            
            <aside className="w-64 bg-white hidden md:flex flex-col border-r border-gray-200 shadow-sm z-10">
              <ul className="space-y-1 py-4 flex-1 overflow-y-auto">
                {DEPARTMENTS.map(dept => (
                  <li 
                    key={dept}
                    onClick={() => setSelectedDept(dept)}
                    className={`px-6 py-3 cursor-pointer transition-colors text-sm font-medium border-l-4 ${
                      selectedDept === dept 
                      ? 'border-[#1a8241] text-[#1a8241] bg-green-50' 
                      : 'border-transparent text-gray-600 hover:bg-gray-50 hover:text-gray-900'
                    }`}
                  >
                    {dept}
                  </li>
                ))}
              </ul>
            </aside>

            <main className="flex-1 p-6 overflow-y-auto">
              
              <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-wrap justify-between items-center mb-6 gap-6">
                <div className="flex gap-4">
                  <button className="p-2 bg-gray-50 border border-gray-200 hover:bg-gray-100 rounded-lg text-gray-600 transition-colors">
                    <i data-lucide="filter" className="w-5 h-5"></i>
                  </button>
                  <button className="p-2 bg-gray-50 border border-gray-200 hover:bg-gray-100 rounded-lg text-gray-600 transition-colors">
                    <i data-lucide="external-link" className="w-5 h-5"></i>
                  </button>
                </div>

                <div className="flex items-center gap-8 lg:gap-16">
                  <GaugeChart value={completedTasks} total={totalTasks} />
                  <div className="flex flex-col items-center">
                    <span className="text-[#84cc16] text-5xl font-bold">{completionPercentage} %</span>
                    <span className="text-[#0c4a6e] font-semibold mt-1">% de terminación</span>
                  </div>
                </div>

                <div className="w-40 h-40 rounded-full border-4 border-gray-50 overflow-hidden shadow-md hidden lg:block bg-gray-100">
                  <img 
                    src={PROFILE_IMAGES[selectedDept] || PROFILE_IMAGES["Todas las Tareas"]} 
                    alt="Perfil" 
                    className="w-full h-full object-cover object-top" 
                    onError={(e) => { 
                      e.target.onerror = null; 
                      e.target.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2YxZjVmOSIvPjx0ZXh0IHg9IjUwIiB5PSI1MCIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMjQiIGZpbGw9IiM5Y2EzYWYiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5Gb3RvPC90ZXh0Pjwvc3ZnPg=='; 
                    }}
                  />
                </div>
              </div>

              {/* Renderizado condicional del Dashboard dependiendo si se seleccionó "Indicadores" o una Área normal */}
              {selectedDept === "Indicadores" ? (
                renderIndicatorDashboard()
              ) : (
                <div className="grid grid-cols-1 xl:grid-cols-12 gap-6 mb-8">
                  <div className="xl:col-span-4 grid grid-cols-2 gap-4">
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4 hover:shadow-md transition-shadow">
                      <div className="w-12 h-12 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center"><i data-lucide="clipboard-list" className="w-6 h-6"></i></div>
                      <div><p className="text-gray-500 text-xs font-semibold uppercase">Total</p><p className="text-2xl font-bold text-gray-800">{totalTasks}</p></div>
                    </div>
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4 hover:shadow-md transition-shadow">
                      <div className="w-12 h-12 rounded-lg bg-green-50 text-[#1a8241] flex items-center justify-center"><i data-lucide="check-circle" className="w-6 h-6"></i></div>
                      <div><p className="text-gray-500 text-xs font-semibold uppercase">Completas</p><p className="text-2xl font-bold text-gray-800">{completedTasks}</p></div>
                    </div>
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4 hover:shadow-md transition-shadow">
                      <div className="w-12 h-12 rounded-lg bg-yellow-50 text-yellow-600 flex items-center justify-center"><i data-lucide="clock" className="w-6 h-6"></i></div>
                      <div><p className="text-gray-500 text-xs font-semibold uppercase">En Proceso</p><p className="text-2xl font-bold text-gray-800">{inProgressTasks}</p></div>
                    </div>
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4 hover:shadow-md transition-shadow">
                      <div className="w-12 h-12 rounded-lg bg-red-50 text-red-600 flex items-center justify-center"><i data-lucide="alert-triangle" className="w-6 h-6"></i></div>
                      <div><p className="text-gray-500 text-xs font-semibold uppercase">Retrasadas</p><p className="text-2xl font-bold text-gray-800">{delayedTasks}</p></div>
                    </div>
                  </div>

                  <div className="xl:col-span-4 bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                    <h3 className="text-sm font-bold text-gray-700 flex items-center gap-2 mb-4">
                      <i data-lucide="pie-chart" className="w-4 h-4 text-[#1a8241]"></i> Distribución por Estado
                    </h3>
                    <DoughnutChart data={statusData} />
                  </div>

                  <div className="xl:col-span-4 bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                     <h3 className="text-sm font-bold text-gray-700 flex items-center gap-2 mb-4">
                      <i data-lucide="bar-chart-2" className="w-4 h-4 text-[#1a8241]"></i> Tareas por Responsable
                    </h3>
                    <CustomBarChart data={areaData} />
                  </div>
                </div>
              )}

              <div className="flex flex-col sm:flex-row justify-between items-center mb-4 gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <div className="flex items-center gap-4">
                  <h2 className="text-lg font-bold text-[#1a8241]">
                    Listado de Tareas {selectedDept !== "Todas las Tareas" && `- ${selectedDept}`}
                  </h2>
                  {hasActiveFilters && (
                    <button 
                      onClick={() => setColumnFilters({})} 
                      className="flex items-center gap-1.5 px-3 py-1 bg-red-50 text-red-600 hover:bg-red-100 rounded-lg text-xs font-semibold transition-colors"
                    >
                      <i data-lucide="x" className="w-3 h-3"></i> Limpiar filtros
                    </button>
                  )}
                </div>
                <div className="flex gap-3 items-center">
                  {isSyncing && (
                    <span className="text-xs text-gray-500 flex items-center gap-1 mr-2">
                      <i data-lucide="refresh-cw" className="w-3 h-3 animate-spin"></i> Actualizando...
                    </span>
                  )}
                  <button onClick={() => openModal(null)} className="flex items-center gap-2 bg-[#1a8241] hover:bg-green-800 text-white px-4 py-2 rounded-lg shadow-sm transition-colors text-sm font-medium">
                    <i data-lucide="plus" className="w-4 h-4"></i> Añadir Tarea
                  </button>
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden pb-32">
                <div className="overflow-x-auto">
                  <table className="w-full text-sm text-left border-collapse">
                    <thead className="bg-[#1a8241] text-white">
                      <tr>
                        {renderHeader('responsablePrincipal', 'RESP. PRINCIPAL')}
                        {renderHeader('responsableSecundario', 'RESP. SECUNDARIO')}
                        {renderHeader('indicador', 'INDICADOR')}
                        {renderHeader('compromiso', 'COMPROMISO/DECISIONES', 'min-w-[250px] max-w-[300px]')}
                        {renderHeader('fechaInicio', 'FECHA INICIO')}
                        {renderHeader('fechaFin', 'FECHA FIN')}
                        {renderHeader('estado', 'ESTADO')}
                        {renderHeader('observaciones', 'OBSERVACIONES', 'min-w-[150px] max-w-[200px]')}
                        {renderHeader('avance', '% AVANCE', 'text-center')}
                        {renderHeader('contexto', 'CONTEXTO', 'min-w-[200px] max-w-[250px]')}
                        <th className="p-3 text-center">ACCIONES</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredTasks.length === 0 ? (
                        <tr><td colSpan="11" className="text-center p-8 text-gray-500 bg-gray-50">No hay tareas.</td></tr>
                      ) : (
                        filteredTasks.map((task, index) => {
                          const avanceNum = Math.min(Math.max(parseInt(task.avance) || 0, 0), 100);
                          
                          return (
                            <tr key={task.id} className={`${index % 2 === 0 ? 'bg-white' : 'bg-gray-50'} hover:bg-green-50 transition-colors border-b border-gray-100 last:border-0`}>
                              <td className="p-3 text-gray-700">{task.responsablePrincipal}</td>
                              <td className="p-3 text-gray-700">{task.responsableSecundario}</td>
                              <td className="p-3 font-semibold text-[#1a8241]">{task.indicador || "-"}</td>
                              <td className="p-3 font-medium text-gray-800 max-w-[300px] break-words whitespace-normal">{task.compromiso}</td>
                              <td className="p-3 text-gray-600 whitespace-nowrap">{task.fechaInicio}</td>
                              <td className="p-3 text-gray-600 whitespace-nowrap">{task.fechaFin}</td>
                              <td className="p-3 text-center">
                                 <span className={`px-2 py-1 rounded-md text-xs font-bold whitespace-nowrap ${
                                   task.estado === 'Finalizado' ? 'bg-green-100 text-green-700' :
                                   task.estado === 'En Progreso' ? 'bg-blue-100 text-blue-700' :
                                   task.estado === 'Retrasado' ? 'bg-red-100 text-red-700' :
                                   'bg-yellow-100 text-yellow-700'
                                 }`}>
                                   {task.estado}
                                 </span>
                              </td>
                              <td className="p-3 text-gray-600 text-xs max-w-[200px] break-words whitespace-normal">{task.observaciones}</td>
                              <td className="p-3 min-w-[100px]">
                                <div className="flex items-center gap-2">
                                  <div className="w-full bg-gray-200 rounded-full h-2">
                                    <div className="bg-[#1a8241] h-2 rounded-full" style={{width: `${avanceNum}%`}}></div>
                                  </div>
                                  <span className="text-xs font-bold text-gray-700 w-8">{avanceNum}%</span>
                                </div>
                              </td>
                              <td className="p-3 text-gray-600 text-xs max-w-[250px] break-words whitespace-normal">{task.contexto}</td>
                              <td className="p-3 text-center space-x-1 whitespace-nowrap">
                                <button onClick={() => openModal(task)} className="text-blue-600 hover:bg-blue-50 p-1.5 rounded transition-colors"><i data-lucide="edit-2" className="w-4 h-4"></i></button>
                                <button onClick={() => handleDelete(task.id)} className="text-red-500 hover:bg-red-50 p-1.5 rounded transition-colors"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                              </td>
                            </tr>
                          );
                        })
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

            </main>
          </div>

          {isModalOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-in fade-in duration-200" onClick={() => setIsModalOpen(false)}>
              <div className="bg-white border border-gray-200 rounded-[18px] p-8 w-full max-w-[560px] max-h-[90vh] overflow-y-auto shadow-2xl animate-in slide-in-from-bottom-4 duration-200" onClick={e => e.stopPropagation()}>
                
                <h2 className="text-3xl font-serif mb-1 text-gray-900">
                  {editingTask ? <>Editar <em className="text-[#1a8241] italic">actividad</em></> : <>Nueva <em className="text-[#1a8241] italic">actividad</em></>}
                </h2>
                <p className="text-[13px] text-gray-500 mb-6">Completa los detalles. Puedes editarlos en cualquier momento.</p>

                <form onSubmit={handleSaveTask}>
                  
                  <div className="mb-4">
                    <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-medium">Compromiso / Decisiones *</label>
                    <input name="compromiso" required defaultValue={editingTask?.compromiso || ''} autoFocus placeholder="Ej. Realizar mejoras al formato..." className="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-[14px] text-gray-800 focus:outline-none focus:border-[#1a8241] focus:ring-1 focus:ring-[#1a8241] transition-all" />
                  </div>

                  <div className="mb-4">
                    <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-medium">Contexto</label>
                    <textarea name="contexto" defaultValue={editingTask?.contexto || ''} placeholder="Detalles, contexto, entregables..." className="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-[14px] text-gray-800 focus:outline-none focus:border-[#1a8241] focus:ring-1 focus:ring-[#1a8241] transition-all min-h-[80px] resize-y" />
                  </div>

                  <div className="grid grid-cols-2 gap-3 mb-4">
                    <div>
                      <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-medium">Resp. Principal</label>
                      <select name="responsablePrincipal" defaultValue={editingTask?.responsablePrincipal || DEPARTMENTS[1]} className="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-[14px] text-gray-800 focus:outline-none focus:border-[#1a8241] focus:ring-1 focus:ring-[#1a8241] transition-all">
                        {DEPARTMENTS.slice(1, -1).map(d => <option key={d} value={d}>{d}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-medium">Resp. Secundario</label>
                      <select name="responsableSecundario" defaultValue={editingTask?.responsableSecundario || "Ninguno"} className="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-[14px] text-gray-800 focus:outline-none focus:border-[#1a8241] focus:ring-1 focus:ring-[#1a8241] transition-all">
                        <option value="Ninguno">Ninguno</option>
                        {DEPARTMENTS.slice(1, -1).map(d => <option key={d} value={d}>{d}</option>)}
                      </select>
                    </div>
                  </div>

                  <div className="mb-4">
                    <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-medium">Indicador Estratégico</label>
                    <select name="indicador" defaultValue={editingTask?.indicador || ''} className="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-[14px] text-gray-800 focus:outline-none focus:border-[#1a8241] focus:ring-1 focus:ring-[#1a8241] transition-all">
                      <option value="">Seleccione un indicador de la lista...</option>
                      {indicadoresList.map((ind, i) => (
                        <option key={i} value={ind}>{ind}</option>
                      ))}
                    </select>
                  </div>

                  <div className="grid grid-cols-2 gap-3 mb-4">
                    <div>
                      <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-medium">Fecha Inicio</label>
                      <input type="date" name="fechaInicio" required defaultValue={editingTask?.fechaInicio || ''} className="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-[14px] text-gray-800 focus:outline-none focus:border-[#1a8241] focus:ring-1 focus:ring-[#1a8241] transition-all" />
                    </div>
                    <div>
                      <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-medium">Fecha Límite</label>
                      <input type="date" name="fechaFin" required defaultValue={editingTask?.fechaFin || ''} className="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-[14px] text-gray-800 focus:outline-none focus:border-[#1a8241] focus:ring-1 focus:ring-[#1a8241] transition-all" />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-3 mb-4">
                    <div>
                      <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-medium">Estado</label>
                      <select name="estado" defaultValue={editingTask?.estado || 'Pendiente'} className="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-[14px] text-gray-800 focus:outline-none focus:border-[#1a8241] focus:ring-1 focus:ring-[#1a8241] transition-all">
                        <option value="Pendiente">Pendiente</option>
                        <option value="En Progreso">En Progreso</option>
                        <option value="Finalizado">Finalizado</option>
                        <option value="Retrasado">Retrasado</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-medium">Avance · {modalAvance}%</label>
                      <div className="flex items-center gap-3 pt-2">
                        <input type="range" name="avance" min="0" max="100" step="5" value={modalAvance} onChange={e => setModalAvance(e.target.value)} className="flex-1 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[#1a8241]" />
                        <span className="font-mono text-[13px] min-w-[35px] text-right text-gray-800">{modalAvance}%</span>
                      </div>
                    </div>
                  </div>

                  <div className="mb-6">
                    <label className="block text-[11px] uppercase tracking-[0.1em] text-gray-500 mb-1.5 font-medium">Observaciones</label>
                    <input name="observaciones" defaultValue={editingTask?.observaciones || ''} placeholder="Opcional..." className="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-[14px] text-gray-800 focus:outline-none focus:border-[#1a8241] focus:ring-1 focus:ring-[#1a8241] transition-all" />
                  </div>

                  <div className="flex justify-end gap-2 mt-6">
                    <button type="button" onClick={() => setIsModalOpen(false)} className="px-4 py-2.5 rounded-lg text-[13px] font-medium text-gray-600 border border-gray-200 bg-transparent hover:border-[#1a8241] hover:text-[#1a8241] transition-all flex items-center gap-2">
                      <i data-lucide="x" className="w-4 h-4"></i> Cancelar
                    </button>
                    <button type="submit" className="px-4 py-2.5 rounded-lg text-[13px] font-medium bg-[#1a8241] text-white hover:bg-green-700 hover:-translate-y-[1px] transition-all flex items-center gap-2 shadow-sm">
                      <i data-lucide="check" className="w-4 h-4"></i> {editingTask ? "Guardar" : "Crear"}
                    </button>
                  </div>

                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Renderizar la app en el div 'root'
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
